name: StormDNS Boundary

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: read

jobs:
  upstream-guard:
    name: Guard upstream engine changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout WhiteDNS
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Check StormDNS upstream boundary
        env:
          HAS_UPSTREAM_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'allow-stormdns-upstream') }}
        run: |
          set -euo pipefail
          base_ref="${{ github.event.pull_request.base.sha }}"
          head_ref="${{ github.event.pull_request.head.sha }}"

          set +e
          scripts/check-stormdns-boundary.sh "${base_ref}" "${head_ref}"
          guard_status=$?
          set -e

          case "${guard_status}" in
            0)
              exit 0
              ;;
            1)
              if [[ "${HAS_UPSTREAM_LABEL}" == "true" ]]; then
                echo "StormDNS upstream changes are intentionally labeled."
                exit 0
              fi
              exit 1
              ;;
            *)
              echo "StormDNS boundary guard failed before it could evaluate upstream changes." >&2
              exit "${guard_status}"
              ;;
          esac
